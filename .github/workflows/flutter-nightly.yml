name: Flutter Nightly Build

on:
  # Disabled daily schedule — saves GitHub Actions minutes (free tier limit).
  # Build only on manual trigger or push to master.
  # To re-enable nightly: uncomment schedule below.
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'libs/**'
      - 'src/**'
      - 'flutter/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: write

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
